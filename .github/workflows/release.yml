name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.mode.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}

    steps:
      - name: Check release trigger
        id: mode
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          should_release=false
          lc_message="${COMMIT_MESSAGE,,}"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            should_release=true
          elif [[ "$lc_message" == *"release:"* && "$REF_NAME" == "main" ]]; then
            should_release=true
          fi

          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        if: steps.mode.outputs.should_release == 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read version from manifest
        if: steps.mode.outputs.should_release == 'true'
        id: version
        env:
          RUN_NUMBER: ${{ github.run_number }}
          SHA_SHORT: ${{ github.sha }}
        run: |
          set -euo pipefail

          version="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("custom_components/ollama_cloud_usage/manifest.json").read_text())["version"])
          PY
          )"

          tag="v${version}"
          artifact_name="ollama_cloud_usage-${version}.zip"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

  test:
    name: Test release candidate
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  release:
    name: Publish release
    needs:
      - prepare
      - test
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Build HACS archive
        env:
          ARTIFACT_NAME: ${{ needs.prepare.outputs.artifact_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          zip -r "dist/${ARTIFACT_NAME}" custom_components/ollama_cloud_usage \
            -x "__pycache__/*" \
            -x "*/__pycache__/*" \
            -x "*.pyc"

      - name: Collect commits for changelog
        id: commits
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail

          previous_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [[ -n "$previous_tag" ]]; then
            range="${previous_tag}..HEAD"
          else
            range="HEAD"
          fi

          {
            echo "commits<<EOF"
            git log "$range" --pretty=format:"- %s (%h)%n%b" --name-only --no-merges
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Collect contributor shoutouts for changelog
        id: contributors
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail

          previous_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [[ -n "$previous_tag" ]]; then
            range="${previous_tag}..HEAD"
            previous_authors="$(git log "$previous_tag" --format='%aN <%aE>' | sort -u)"
          else
            range="HEAD"
            previous_authors=""
          fi

          range_authors="$(git log "$range" --format='%aN <%aE>' | sort -u)"
          if [[ -n "$previous_authors" ]]; then
            new_authors="$(comm -23 <(printf '%s\n' "$range_authors") <(printf '%s\n' "$previous_authors") | sed '/^$/d')"
          else
            new_authors="$range_authors"
          fi

          new_details=""
          if [[ -n "$new_authors" ]]; then
            while IFS= read -r author; do
              if [[ -z "$author" ]]; then
                continue
              fi
              new_details+="- ${author}\n"
              while IFS= read -r commit_line; do
                new_details+="  - ${commit_line}\n"
              done < <(git log "$range" --author="$author" --pretty=format:'%s (%h)' --no-merges)
              new_details+="\n"
            done <<< "$new_authors"
          fi

          {
            echo "new_contributor_details<<EOF"
            if [[ -n "$new_details" ]]; then
              printf '%b' "$new_details"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate changelog with GitHub AI
        id: ai_changelog
        continue-on-error: true
        uses: actions/ai-inference@v2
        with:
          model: openai/gpt-4o
          max-tokens: 700
          system-prompt: >-
            You write concise GitHub release notes for a Home Assistant custom
            integration. Use Markdown bullets. Do not invent changes. Use the
            commit subject, body, and changed files to summarize what changed. 
            If the changes include fixes within the same release related to new
            features being introduced, don't mention the fixes. Only the new releases.
            Also do not include notes about changes to files around versioning.
          prompt: |
            Create release notes for ollama_cloud_usage.

            Channel: release
            Version: ${{ needs.prepare.outputs.version }}
            Tag: ${{ needs.prepare.outputs.tag }}

            Commits:
            ${{ steps.commits.outputs.commits }}

      - name: Write release notes
        env:
          AI_NOTES_FILE: ${{ steps.ai_changelog.outputs.response-file }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          COMMITS: ${{ steps.commits.outputs.commits }}
          NEW_CONTRIBUTOR_DETAILS: ${{ steps.contributors.outputs.new_contributor_details }}
        run: |
          set -euo pipefail

          {
            echo
            if [[ -n "${AI_NOTES_FILE:-}" && -s "$AI_NOTES_FILE" ]]; then
              cat "$AI_NOTES_FILE"
            else
              echo "## Changes"
              echo
              if [[ -n "$COMMITS" ]]; then
                echo "$COMMITS"
              else
                echo "- Release ${TAG}"
              fi
            fi
            if [[ -n "${NEW_CONTRIBUTOR_DETAILS:-}" ]]; then
              echo
              echo "## New contributors"
              echo
              echo "$NEW_CONTRIBUTOR_DETAILS"
            fi
            echo
            echo "## HACS"
            echo
            echo "Download the attached ollama_cloud_usage zip archive or install/update through HACS."
          } > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          ARTIFACT_NAME: ${{ needs.prepare.outputs.artifact_name }}
        run: |
          set -euo pipefail

          title="Ollama Usage Viewer ${TAG}"

          gh release create "$TAG" \
            "dist/${ARTIFACT_NAME}" \
            --title "$title" \
            --notes-file release-notes.md
